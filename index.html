<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Konak 1882 — Menü</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #131008;
    color: #F5EFE0;
    font-family: 'Cormorant Garamond', 'Garamond', serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  /* Background video */
  .bg-video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    pointer-events: none;
  }
  .bg-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, rgba(19,16,8,0.55) 0%, rgba(19,16,8,0.72) 100%);
    z-index: 1;
  }

  /* Foreground */
  .wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
  }
  .frame {
    width: 100%;
    max-width: 420px;
    text-align: center;
    border: 0.6px solid rgba(245, 239, 224, 0.45);
    padding: 52px 28px 44px;
    position: relative;
    background: rgba(19, 16, 8, 0.35);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .frame::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 0.4px solid rgba(245, 239, 224, 0.25);
    pointer-events: none;
  }
  .line {
    height: 0.6px;
    background: rgba(245, 239, 224, 0.5);
    width: 60%;
    margin: 0 auto;
  }
  h1 {
    font-size: 40px;
    font-weight: 300;
    letter-spacing: 14px;
    padding-left: 14px;
    margin: 26px 0 6px;
    color: #F5EFE0;
  }
  .tagline {
    font-size: 10.5px;
    font-weight: 300;
    letter-spacing: 6px;
    color: rgba(245, 239, 224, 0.75);
    margin-bottom: 26px;
  }
  .label {
    font-size: 12px;
    font-style: italic;
    letter-spacing: 3px;
    color: rgba(245, 239, 224, 0.7);
    margin: 32px 0 22px;
  }
  .menus {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin: 22px 0 8px;
  }
  .menu-btn {
    display: block;
    text-decoration: none;
    color: #F5EFE0;
    background: transparent;
    border: 1px solid rgba(245, 239, 224, 0.55);
    padding: 20px 22px;
    transition: all 0.25s ease;
    position: relative;
  }
  .menu-btn:hover, .menu-btn:active {
    background: rgba(245, 239, 224, 0.92);
    color: #2C2416;
    border-color: rgba(245, 239, 224, 0.92);
  }
  .menu-btn .title {
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 10px;
    padding-left: 10px;
    display: block;
  }
  .menu-btn .sub {
    font-size: 9.5px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 6px;
    display: block;
  }
  .footer {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(245, 239, 224, 0.55);
    margin-top: 26px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline preload="auto" poster="">
    <source src="./intro.mp4" type="video/mp4">
  </video>
  <div class="bg-overlay"></div>

  <main class="wrap">
    <div class="frame">
      <div class="line"></div>
      <h1>KONAK</h1>
      <div class="tagline">1882 &nbsp;·&nbsp; CUNDA, AYVALIK</div>
      <div class="line"></div>

      <div class="label">menü seçiniz</div>

      <div class="menus">
        <a href="./avlu.html" class="menu-btn">
          <span class="title">AVLU</span>
          <span class="sub">Restoran</span>
        </a>
        <a href="./konak.html" class="menu-btn">
          <span class="title">KONAK 1882</span>
          <span class="sub">Pastane &nbsp;·&nbsp; Bar</span>
        </a>
      </div>

      <div class="footer">Cunda &nbsp;·&nbsp; Ayvalık</div>
    </div>
  </main>
</body>
</html>
