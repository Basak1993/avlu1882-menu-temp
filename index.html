<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Konak 1882 — Menü</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #F2EBDD;
  }
  body {
    color: #2C2416;
    font-family: 'Cormorant Garamond', 'Garamond', serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ====== Video stage ====== */
  .video-stage {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    background: #F2EBDD;
    z-index: 2;
    transition: opacity 0.5s ease;
    overflow: hidden;
  }
  .video-stage.hidden { opacity: 0; pointer-events: none; }
  .video-stage video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    display: block;
    background: #F2EBDD;
  }
  .sound-toggle {
    position: absolute;
    top: max(16px, env(safe-area-inset-top, 16px));
    right: max(16px, env(safe-area-inset-right, 16px));
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(44, 36, 22, 0.55);
    border: 0.6px solid rgba(242, 235, 221, 0.5);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 3;
  }
  .sound-toggle svg { width: 20px; height: 20px; fill: #F2EBDD; }

  /* ====== Menu stage ====== */
  .menu-stage {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    background: #F2EBDD;
  }
  .menu-stage.active { opacity: 1; pointer-events: auto; z-index: 4; }

  .frame {
    width: 100%;
    max-width: 460px;
    text-align: center;
    border: 0.6px solid rgba(44, 36, 22, 0.35);
    padding: 36px 28px 40px;
    position: relative;
  }
  .frame::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 0.4px solid rgba(44, 36, 22, 0.18);
    pointer-events: none;
  }

  .logo {
    display: block;
    width: 100%;
    max-width: 380px;
    height: auto;
    margin: 4px auto 18px;
  }

  .line {
    height: 0.6px;
    background: rgba(44, 36, 22, 0.4);
    width: 55%;
    margin: 0 auto;
  }

  .welcome {
    font-size: 30px;
    font-weight: 300;
    letter-spacing: 6px;
    padding-left: 6px;
    margin: 22px 0 4px;
    color: #2C2416;
    font-style: italic;
  }
  .welcome-sub {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 6px;
    color: rgba(44, 36, 22, 0.7);
    margin-bottom: 22px;
    text-transform: uppercase;
  }

  .label {
    font-size: 11px;
    font-style: italic;
    letter-spacing: 3px;
    color: rgba(44, 36, 22, 0.6);
    margin: 24px 0 18px;
  }
  .menus { display: flex; flex-direction: column; gap: 12px; margin: 18px 0 6px; }
  .menu-btn {
    display: block;
    text-decoration: none;
    color: #2C2416;
    background: transparent;
    border: 1px solid rgba(44, 36, 22, 0.45);
    padding: 18px 22px;
    transition: all 0.25s ease;
  }
  .menu-btn:hover, .menu-btn:active {
    background: #2C2416;
    color: #F2EBDD;
    border-color: #2C2416;
  }
  .menu-btn .title {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 10px;
    padding-left: 10px;
    display: block;
  }
  .menu-btn .sub {
    font-size: 9.5px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 6px;
    display: block;
  }
  .footer {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(44, 36, 22, 0.55);
    margin-top: 22px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <!-- ============ VIDEO ============ -->
  <div class="video-stage" id="videoStage">
    <video id="introVid" autoplay muted playsinline preload="auto">
      <source src="./intro.mp4" type="video/mp4">
    </video>
    <div class="sound-toggle" id="soundToggle" title="sesi aç">
      <svg viewBox="0 0 24 24" id="iconMuted"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.17v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      <svg viewBox="0 0 24 24" id="iconUnmuted" style="display:none"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </div>
  </div>

  <!-- ============ MENU ============ -->
  <div class="menu-stage" id="menuStage">
    <div class="frame">
      <img src="./konak-muhur.png" alt="Konak 1882" class="logo">
      <div class="line"></div>
      <div class="welcome">Hoşgeldiniz</div>
      <div class="welcome-sub">Konak 1882</div>
      <div class="line"></div>

      <div class="label">menü seçiniz</div>

      <div class="menus">
        <a href="./konak.html" class="menu-btn">
          <span class="title">KONAK 1882</span>
          <span class="sub">Resto &nbsp;·&nbsp; Bar</span>
        </a>
        <a href="./avlu.html" class="menu-btn">
          <span class="title">AVLU 1882</span>
          <span class="sub">Yakında</span>
        </a>
      </div>

      <div class="footer">Cunda &nbsp;·&nbsp; Ayvalık</div>
    </div>
  </div>

  <script>
    const videoStage = document.getElementById('videoStage');
    const menuStage = document.getElementById('menuStage');
    const video = document.getElementById('introVid');
    const soundToggle = document.getElementById('soundToggle');
    const iconMuted = document.getElementById('iconMuted');
    const iconUnmuted = document.getElementById('iconUnmuted');

    function showMenu() {
      videoStage.classList.add('hidden');
      menuStage.classList.add('active');
      try { video.pause(); } catch (e) {}
    }
    video.addEventListener('ended', showMenu);

    soundToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      video.muted = !video.muted;
      if (!video.muted) {
        iconMuted.style.display = 'none';
        iconUnmuted.style.display = '';
        video.play().catch(() => {});
      } else {
        iconMuted.style.display = '';
        iconUnmuted.style.display = 'none';
      }
    });

    video.play().catch(() => {
      const resume = () => { video.play().catch(() => {}); document.removeEventListener('click', resume); };
      document.addEventListener('click', resume, { once: true });
    });
  </script>
</body>
</html>
