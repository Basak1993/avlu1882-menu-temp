<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Konak 1882 — Menü</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #14130D; }
  body {
    color: #F5EFE0;
    font-family: 'Cormorant Garamond', 'Garamond', serif;
    -webkit-font-smoothing: antialiased;
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  /* ====== Video stage — centered viewport with video filling it ====== */
  .video-stage {
    position: fixed;
    inset: 0;
    background: #14130D;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s ease;
  }
  .video-stage.hidden { opacity: 0; pointer-events: none; }

  .video-stage .viewport {
    position: relative;
    width: min(100vw, calc(100vh * 1272 / 1628));
    height: min(100vh, calc(100vw * 1628 / 1272));
    max-width: 100vw;
    max-height: 100vh;
    background: #14130D;
    overflow: hidden;
  }

  .video-stage video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: #14130D;
  }

  /* subtle unmute hint */
  .sound-toggle {
    position: absolute;
    top: max(16px, env(safe-area-inset-top, 16px));
    right: max(16px, env(safe-area-inset-right, 16px));
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(19, 16, 8, 0.55);
    border: 0.6px solid rgba(245, 239, 224, 0.5);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 3;
    transition: all 0.2s;
  }
  .sound-toggle:hover { background: rgba(19, 16, 8, 0.85); }
  .sound-toggle svg { width: 20px; height: 20px; fill: #F5EFE0; }

  /* ====== Menu stage ====== */
  .menu-stage {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .menu-stage.active { opacity: 1; pointer-events: auto; z-index: 4; }

  .frame {
    width: 100%;
    max-width: 420px;
    text-align: center;
    border: 0.6px solid rgba(245, 239, 224, 0.45);
    padding: 52px 28px 44px;
    position: relative;
  }
  .frame::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 0.4px solid rgba(245, 239, 224, 0.25);
    pointer-events: none;
  }
  .line {
    height: 0.6px;
    background: rgba(245, 239, 224, 0.5);
    width: 60%;
    margin: 0 auto;
  }
  .menu-stage h1 {
    font-size: 40px;
    font-weight: 300;
    letter-spacing: 14px;
    padding-left: 14px;
    margin: 26px 0 6px;
    color: #F5EFE0;
  }
  .menu-stage .tagline {
    font-size: 10.5px;
    font-weight: 300;
    letter-spacing: 6px;
    color: rgba(245, 239, 224, 0.75);
    margin-bottom: 26px;
  }
  .label {
    font-size: 12px;
    font-style: italic;
    letter-spacing: 3px;
    color: rgba(245, 239, 224, 0.7);
    margin: 32px 0 22px;
  }
  .menus { display: flex; flex-direction: column; gap: 14px; margin: 22px 0 8px; }
  .menu-btn {
    display: block;
    text-decoration: none;
    color: #F5EFE0;
    background: transparent;
    border: 1px solid rgba(245, 239, 224, 0.55);
    padding: 20px 22px;
    transition: all 0.25s ease;
  }
  .menu-btn:hover, .menu-btn:active {
    background: rgba(245, 239, 224, 0.92);
    color: #2C2416;
    border-color: rgba(245, 239, 224, 0.92);
  }
  .menu-btn .title {
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 10px;
    padding-left: 10px;
    display: block;
  }
  .menu-btn .sub {
    font-size: 9.5px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 6px;
    display: block;
  }
  .footer {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(245, 239, 224, 0.55);
    margin-top: 26px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <!-- ============ VIDEO (autoplay centered) ============ -->
  <div class="video-stage" id="videoStage">
    <div class="viewport">
      <video id="introVid" autoplay muted playsinline preload="auto">
        <source src="./intro.mp4" type="video/mp4">
      </video>
    </div>
    <div class="sound-toggle" id="soundToggle" title="sesi aç">
      <svg viewBox="0 0 24 24" id="iconMuted"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.17v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      <svg viewBox="0 0 24 24" id="iconUnmuted" style="display:none"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </div>
  </div>

  <!-- ============ MENU ============ -->
  <div class="menu-stage" id="menuStage">
    <div class="frame">
      <div class="line"></div>
      <h1>KONAK</h1>
      <div class="tagline">1882 &nbsp;·&nbsp; CUNDA, AYVALIK</div>
      <div class="line"></div>

      <div class="label">menü seçiniz</div>

      <div class="menus">
        <a href="./avlu.html" class="menu-btn">
          <span class="title">AVLU</span>
          <span class="sub">Restoran</span>
        </a>
        <a href="./konak.html" class="menu-btn">
          <span class="title">KONAK 1882</span>
          <span class="sub">Pastane &nbsp;·&nbsp; Bar</span>
        </a>
      </div>

      <div class="footer">Cunda &nbsp;·&nbsp; Ayvalık</div>
    </div>
  </div>

  <script>
    const videoStage = document.getElementById('videoStage');
    const menuStage = document.getElementById('menuStage');
    const video = document.getElementById('introVid');
    const soundToggle = document.getElementById('soundToggle');
    const iconMuted = document.getElementById('iconMuted');
    const iconUnmuted = document.getElementById('iconUnmuted');

    function showMenu() {
      videoStage.classList.add('hidden');
      menuStage.classList.add('active');
      try { video.pause(); } catch (e) {}
    }

    video.addEventListener('ended', showMenu);

    soundToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      video.muted = !video.muted;
      if (!video.muted) {
        iconMuted.style.display = 'none';
        iconUnmuted.style.display = '';
        // ensure playback continues
        video.play().catch(() => {});
      } else {
        iconMuted.style.display = '';
        iconUnmuted.style.display = 'none';
      }
    });

    // Fallback: if autoplay blocked, force play on first interaction
    video.play().catch(() => {
      const resume = () => { video.play().catch(() => {}); document.removeEventListener('click', resume); };
      document.addEventListener('click', resume, { once: true });
    });
  </script>
</body>
</html>
